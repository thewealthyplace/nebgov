name: Documentation Request
description: Report missing or unclear documentation
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: textarea
    id: missing
    attributes:
      label: What is missing or unclear?
      description: Describe what documentation is needed
    validations:
      required: true
  - type: textarea
    id: where
    attributes:
      label: Where did you look?
      description: What existing docs did you check?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Content
      description: What should the documentation cover?
    validations:
      required: false
