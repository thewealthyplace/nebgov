name: Bug Report
description: Report a bug in NebGov contracts, SDK, or frontend
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Deploy governor contract with...
        2. Call propose() with...
        3. Observe error...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of NebGov is affected?
      options:
        - Governor Contract
        - Timelock Contract
        - Token Votes Contract
        - Governor Factory
        - Treasury Contract
        - SDK
        - Frontend (app)
        - Documentation
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Network
      description: Which Stellar network?
      options:
        - Testnet
        - Mainnet
        - Local/Standalone
        - N/A
    validations:
      required: true
