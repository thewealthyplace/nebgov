name: Feature Request
description: Suggest a new feature or improvement for NebGov
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe it clearly.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief summary of the feature
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered
    validations:
      required: false
  - type: dropdown
    id: implement
    attributes:
      label: Would you implement this?
      options:
        - "Yes"
        - "No"
        - Maybe with guidance
    validations:
      required: true
