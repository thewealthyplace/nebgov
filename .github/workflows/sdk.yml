name: SDK

on:
  push:
    paths:
      - 'sdk/**'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'sdk/**'

jobs:
  js-security-audit:
    name: JavaScript Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit all workspaces
        run: pnpm audit --audit-level=high

  test:
    name: SDK Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter @nebgov/sdk exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @nebgov/sdk run lint
        continue-on-error: true

      - name: Unit tests with coverage
        run: pnpm --filter @nebgov/sdk run test:coverage

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-test-results
          path: sdk/coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: sdk/coverage/lcov.info
          flags: sdk
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build SDK
        run: pnpm --filter @nebgov/sdk run build

      - name: Bundle size check
        run: |
          if [ -d "sdk/dist" ]; then
            SIZE=$(du -sb sdk/dist | cut -f1)
            LIMIT=512000
            echo "sdk/dist size: ${SIZE} bytes (limit: ${LIMIT} bytes)"
            if [ "$SIZE" -gt "$LIMIT" ]; then
              echo "::warning::sdk/dist exceeds ${LIMIT} bytes (actual: ${SIZE} bytes)"
            fi
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: sdk/dist/
